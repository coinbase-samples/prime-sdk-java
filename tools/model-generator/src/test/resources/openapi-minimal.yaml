      operationId: PrimeRESTAPI_GetFoo
      summary: List entity foo
      tags:
        - Test Tag
      parameters:
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FooResponse'
